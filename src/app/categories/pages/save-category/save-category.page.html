<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/categories"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isCreatingNewCategory ? 'Nueva Categoría' : 'Modificar Categoría' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ isCreatingNewCategory ? 'Crear Categoría' : 'Modificar Categoría' }}</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (errorMessage) {
    <ion-text color="danger">
      <p class="ion-padding-start ion-padding-top">
        <ion-icon name="alert-circle-outline"></ion-icon>
        {{ errorMessage }}
      </p>
    </ion-text>
  }

  <app-category-form
    [category]="category()"
    [shouldCreateNewCategory]="isCreatingNewCategory"
  />
</ion-content>
