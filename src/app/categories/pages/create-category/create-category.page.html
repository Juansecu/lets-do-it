<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/categories"></ion-back-button>
    </ion-buttons>
    <ion-title>Nueva Categoría</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Crear Categoría</ion-title>
    </ion-toolbar>
  </ion-header>

  <form (ngSubmit)="onCreateCategory()">
    <ion-item>
      <ion-label position="floating">Nombre de la Categoría</ion-label>
      <ion-input
        [(ngModel)]="categoryName"
        name="categoryName"
        placeholder="Ej. Trabajo, Compras..."
        required
      ></ion-input>
    </ion-item>

    @if (errorMessage) {
      <ion-text color="danger">
        <p class="ion-padding-start ion-padding-top">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errorMessage }}
        </p>
      </ion-text>
    }

    <div class="ion-margin-top">
      <ion-button expand="block" type="submit" [disabled]="!categoryName">
        Crear Categoría
      </ion-button>
    </div>
  </form>
</ion-content>
