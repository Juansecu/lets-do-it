<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Tareas</ion-title>
    <ion-buttons slot="end">
      <ion-button
        fill="solid"
        color="primary"
        shape="round"
      >
        <ion-icon name="add"></ion-icon>
        <ion-label>Añadir Tarea</ion-label>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tareas</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
